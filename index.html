<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Orbis Guard</title>  

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #050914;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
  touch-action: none;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

#startScreen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(circle, #16264a, #050914 70%);
  z-index: 10;
}

h1 {
  font-size: 42px;
  letter-spacing: 4px;
  margin-bottom: 15px;
}

p {
  color: #b8c8e8;
  margin: 8px 25px;
  font-size: 18px;
}

button {
  margin-top: 30px;
  padding: 16px 45px;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 30px;
  background: #ffffff;
  color: #081020;
}

#score {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 20px;
  z-index: 5;
}

#record {
  position: fixed;
  top: 20px;
  right: 20px;
  font-size: 20px;
  z-index: 5;
}
</style>
</head>

<body>

<div id="score">Poäng: 0</div>
<div id="record">Rekord: 0</div>

<div id="startScreen">
  <h1>ORBIS GUARD</h1>
  <p>Skydda cirkeln från de fallande formerna.</p>
  <p>Dra med fingret för att flytta cirkeln.</p>
  <button id="startButton">STARTA</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let width;
let height;
let player;
let enemies = [];
let particles = [];
let score = 0;
let record = Number(localStorage.getItem("orbisRecord")) || 0;
let running = false;
let spawnTimer = 0;
let lastTime = 0;

document.getElementById("record").textContent = "Rekord: " + record;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  width = canvas.width;
  height = canvas.height;

  if (!player) {
    player = {
      x: width / 2,
      y: height * 0.8,
      radius: 24
    };
  }
}

window.addEventListener("resize", resize);
resize();

function startGame() {
  score = 0;
  enemies = [];
  particles = [];
  spawnTimer = 0;

  player.x = width / 2;
  player.y = height * 0.8;

  running = true;
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("score").textContent = "Poäng: 0";

  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

document.getElementById("startButton").addEventListener("click", startGame);

function movePlayer(x, y) {
  player.x = Math.max(player.radius, Math.min(width - player.radius, x));
  player.y = Math.max(player.radius + 50, Math.min(height - player.radius, y));
}

canvas.addEventListener("touchmove", function(e) {
  e.preventDefault();
  const touch = e.touches[0];
  movePlayer(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener("touchstart", function(e) {
  const touch = e.touches[0];
  movePlayer(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener("mousemove", function(e) {
  if (e.buttons === 1) {
    movePlayer(e.clientX, e.clientY);
  }
});

window.addEventListener("keydown", function(e) {
  const speed = 25;

  if (e.key === "ArrowLeft") player.x -= speed;
  if (e.key === "ArrowRight") player.x += speed;
  if (e.key === "ArrowUp") player.y -= speed;
  if (e.key === "ArrowDown") player.y += speed;

  movePlayer(player.x, player.y);
});

function spawnEnemy() {
  const types = ["circle", "square", "triangle", "star"];

  enemies.push({
    x: 25 + Math.random() * (width - 50),
    y: -40,
    size: 14 + Math.random() * 18,
    speed: 2.5 + Math.random() * 2 + score * 0.015,
    type: types[Math.floor(Math.random() * types.length)],
    rotation: Math.random() * Math.PI
  });
}

function drawPlayer() {
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(80,180,255,0.15)";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#ffffff";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius - 8, 0, Math.PI * 2);
  ctx.fillStyle = "#4da6ff";
  ctx.fill();
}

function drawEnemy(enemy) {
  ctx.save();
  ctx.translate(enemy.x, enemy.y);
  ctx.rotate(enemy.rotation);
  ctx.fillStyle = "#ff4d6d";

  if (enemy.type === "circle") {
    ctx.beginPath();
    ctx.arc(0, 0, enemy.size, 0, Math.PI * 2);
    ctx.fill();
  }

  if (enemy.type === "square") {
    ctx.fillRect(-enemy.size, -enemy.size, enemy.size * 2, enemy.size * 2);
  }

  if (enemy.type === "triangle") {
    ctx.beginPath();
    ctx.moveTo(0, -enemy.size);
    ctx.lineTo(enemy.size, enemy.size);
    ctx.lineTo(-enemy.size, enemy.size);
    ctx.closePath();
    ctx.fill();
  }

  if (enemy.type === "star") {
    ctx.beginPath();

    for (let i = 0; i < 10; i++) {
      const radius = i % 2 === 0 ? enemy.size : enemy.size / 2;
      const angle = (Math.PI * 2 * i / 10) - Math.PI / 2;
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function collision(enemy) {
  const dx = player.x - enemy.x;
  const dy = player.y - enemy.y;
  const distance = Math.sqrt(dx * dx + dy * dy);

  return distance < player.radius + enemy.size * 0.8;
}

function gameOver() {
  running = false;

  if (score > record) {
    record = score;
    localStorage.setItem("orbisRecord", record);
  }

  document.getElementById("record").textContent = "Rekord: " + record;

  const screen = document.getElementById("startScreen");
  screen.style.display = "flex";
  screen.querySelector("h1").textContent = "GAME OVER";
  screen.querySelector("p").textContent = "Poäng: " + score;
  document.getElementById("startButton").textContent = "SPELA IGEN";
}

function update() {
  spawnTimer++;

  const spawnRate = Math.max(20, 65 - Math.floor(score / 5));

  if (spawnTimer >= spawnRate) {
    spawnEnemy();
    spawnTimer = 0;
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const enemy = enemies[i];

    enemy.y += enemy.speed;
    enemy.rotation += 0.02;

    if (collision(enemy)) {
      gameOver();
      return;
    }

    if (enemy.y > height + 50) {
      enemies.splice(i, 1);
      score++;
      document.getElementById("score").textContent = "Poäng: " + score;
    }
  }
}

function drawBackground() {
  ctx.fillStyle = "#050914";
  ctx.fillRect(0, 0, width, height);

  for (let i = 0; i < 40; i++) {
    const x = (i * 97) % width;
    const y = (i * 173) % height;
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.fillRect(x, y, 2, 2);
  }
}

function gameLoop(time) {
  if (!running) return;

  drawBackground();
  update();

  for (const enemy of enemies) {
    drawEnemy(enemy);
  }

  drawPlayer();

  if (running) {
    requestAnimationFrame(gameLoop);
  }
}
</script>

</body>
</html>
